services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - BOCE_BASE_URL=${BOCE_BASE_URL:-https://api.boce.com}
      - BOCE_API_KEY=${BOCE_API_KEY}
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://boce:boce@db:5432/boce_api
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped

  mcp:
    build: .
    ports:
      - "3010:3010"
    environment:
      - NODE_ENV=production
      - MCP_PORT=3010
      - BOCE_BASE_URL=${BOCE_BASE_URL:-https://api.boce.com}
      - BOCE_API_KEY=${BOCE_API_KEY}
      - MCP_ALLOWED_HOSTS=${MCP_ALLOWED_HOSTS:-}
    env_file:
      - .env
    command: sh -c "npm run mcp:start"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  db:
    image: postgres:16
    platform: linux/amd64
    environment:
      POSTGRES_USER: boce
      POSTGRES_PASSWORD: boce
      POSTGRES_DB: boce_api
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boce -d boce_api"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  pgdata:
